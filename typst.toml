[package]
name = "adt"
version = "0.1.0"
compiler = "0.14.2"
entrypoint = "src/lib.typ"
authors = ["felko"]
license = "MIT"
description = "Algebraic data types, validation, and generated helpers"
repository = "https://github.com/felko/typst-adt"
